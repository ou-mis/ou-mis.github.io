<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background tile: deep crimson rounded square with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#681112"/>
      <stop offset="100%" stop-color="#841617"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5e8e8" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6.5" fill="url(#bg)"/>

  <!-- Document body -->
  <rect x="5" y="3" width="16" height="21" rx="1.8" fill="url(#page)"/>

  <!-- Folded corner cutout -->
  <path d="M15 3 L21 9 L15 9 Z" fill="#841617" opacity="0.35"/>
  <!-- Fold crease line -->
  <line x1="15" y1="3" x2="21" y2="9" stroke="#841617" stroke-width="0.7" opacity="0.4"/>

  <!-- Text lines on document -->
  <line x1="8"  y1="13" x2="18" y2="13" stroke="#841617" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="8"  y1="16" x2="18" y2="16" stroke="#841617" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="8"  y1="19" x2="14" y2="19" stroke="#841617" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>

  <!-- Check-badge circle (bottom-right) -->
  <circle cx="23" cy="25" r="5.5" fill="#681112" stroke="white" stroke-width="1.2"/>

  <!-- Checkmark inside badge -->
  <polyline
    points="20.5,25 22.5,27 25.5,22.5"
    stroke="white" stroke-width="1.6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>
</svg>
